<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asei Sugiyama</title>
    <style>
      :root {
        --primary-color: #2c3e50;
        --link-color: #3498db;
        --link-hover-color: #2980b9;
        --bg-color: #f8f9fa;
        --card-bg: #ffffff;
        --text-color: #333333;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        line-height: 1.6;
        color: var(--text-color);
        background-color: var(--bg-color);
        margin: 0;
        padding: 2rem 1rem;
        display: flex;
        justify-content: center;
      }

      .container {
        background-color: var(--card-bg);
        border-radius: 12px;
        box-shadow:
          0 4px 6px rgba(0, 0, 0, 0.05),
          0 10px 15px rgba(0, 0, 0, 0.1);
        padding: 2.5rem;
        max-width: 600px;
        width: 100%;
      }

      h1 {
        color: var(--primary-color);
        margin-top: 0;
        margin-bottom: 1.5rem;
        font-size: 2.5rem;
        border-bottom: 2px solid #eaeaea;
        padding-bottom: 0.5rem;
        text-align: center;
      }

      h2 {
        color: var(--primary-color);
        margin-top: 2rem;
        margin-bottom: 1rem;
        font-size: 1.5rem;
      }

      p {
        margin-bottom: 1rem;
      }

      a {
        color: var(--link-color);
        text-decoration: none;
        transition:
          color 0.2s ease,
          text-decoration 0.2s ease;
        display: inline-block;
      }

      a:hover {
        color: var(--link-hover-color);
        text-decoration: underline;
      }

      .links-group p {
        margin-bottom: 0.5rem;
      }

      .links-inline a {
        margin-right: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 id="asei-sugiyama">Asei Sugiyama</h1>

      <h2 id="slides">Slides</h2>
      <div class="links-inline links-group">
        <p>
          <a
            href="https://www2.slideshare.net/ssusered2356"
            target="_blank"
            rel="noopener noreferrer"
            >SlideShare</a
          >
          <a
            href="https://speakerdeck.com/asei"
            target="_blank"
            rel="noopener noreferrer"
            >Speaker Deck</a
          >
        </p>
      </div>

      <h2 id="publication">Publication</h2>
      <div class="links-group">
        <p>
          <a
            href="https://www.shoeisha.co.jp/book/detail/9784798155654"
            target="_blank"
            rel="noopener noreferrer"
            >見て試してわかる機械学習アルゴリズムの仕組み 機械学習図鑑（秋庭
            伸也 杉山 阿聖 寺田 学 加藤 公一）</a
          >
        </p>
        <p>
          <a
            href="https://gihyo.jp/magazine/wdpress/archive/2020/vol119"
            target="_blank"
            rel="noopener noreferrer"
            >WEB+DB PRESS Vol.119｜技術評論社 特集3 深層学習入門以前
            チュートリアルを動かす前に知っておくこと</a
          >
        </p>
      </div>

      <h2 id="contact">Contact</h2>
      <div class="links-group">
        <p>
          <a
            href="https://twitter.com/K_Ryuichirou"
            target="_blank"
            rel="noopener noreferrer"
            >Twitter</a
          >
        </p>
      </div>
    </div>
  </body>
</html>
